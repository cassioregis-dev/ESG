<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dados de Cadastro — Diagnóstico ESG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="topbar">
  <div class="container">
    <a href="index.html" class="brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 2C7 6 4 10 4 14a8 8 0 0016 0c0-4-3-8-8-12z" fill="#66bb6a"/><path d="M12 22V10" stroke="#1b5e20" stroke-width="1.5"/></svg>
      Diagnóstico ESG
    </a>
    <nav><a href="admin/login.html">Área do Administrador</a></nav>
  </div>
</header>

<section class="section">
  <div class="container" style="max-width:720px;">
    <h1 id="titulo-form">Antes de começar, conte um pouco sobre sua empresa</h1>
    <p style="color:var(--texto-suave);" id="subtitulo-form">Esses dados são usados apenas para identificar seu resultado e para contato futuro. Leva menos de 1 minuto.</p>

    <div class="card" style="margin-top:24px;">
      <form id="lead-form" novalidate>

        <div id="campos-empresa">
          <div class="form-row">
            <div class="form-field">
              <label for="empresa">Nome da Empresa *</label>
              <input type="text" id="empresa" name="empresa">
            </div>
            <div class="form-field">
              <label for="razao_social_empresa">Razão Social *</label>
              <input type="text" id="razao_social_empresa" name="razao_social_empresa">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="cnpj_empresa">CNPJ *</label>
              <input type="text" id="cnpj_empresa" name="cnpj_empresa" placeholder="00.000.000/0000-00">
            </div>
            <div class="form-field">
              <label for="respondente_empresa">Nome do Respondente *</label>
              <input type="text" id="respondente_empresa" name="respondente_empresa">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="email_empresa">E-mail *</label>
              <input type="email" id="email_empresa" name="email_empresa">
            </div>
            <div class="form-field">
              <label for="telefone_empresa">Telefone *</label>
              <input type="tel" id="telefone_empresa" name="telefone_empresa" placeholder="(00) 00000-0000">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="cidade_empresa">Cidade *</label>
              <input type="text" id="cidade_empresa" name="cidade_empresa">
            </div>
            <div class="form-field">
              <label for="estado_empresa">Estado *</label>
              <select id="estado_empresa" name="estado_empresa"></select>
            </div>
          </div>
          <div class="form-field">
            <label>Segmento da Empresa *</label>
            <div class="segmento-options" id="segmento-options">
              <label class="segmento-opt" data-val="Comércio">
                <input type="radio" name="segmento" value="Comércio">🏬 Comércio
              </label>
              <label class="segmento-opt" data-val="Serviços">
                <input type="radio" name="segmento" value="Serviços">🤝 Serviços
              </label>
              <label class="segmento-opt" data-val="Turismo">
                <input type="radio" name="segmento" value="Turismo">🧭 Turismo
              </label>
            </div>
          </div>
        </div>

        <div id="campos-cidade" style="display:none;">
          <div class="form-row">
            <div class="form-field">
              <label for="municipio">Nome do Município *</label>
              <input type="text" id="municipio" name="municipio">
            </div>
            <div class="form-field">
              <label for="estado_cidade">Estado *</label>
              <select id="estado_cidade" name="estado_cidade"></select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="razao_social_cidade">Razão Social *</label>
              <input type="text" id="razao_social_cidade" name="razao_social_cidade" placeholder="Ex: Prefeitura Municipal de...">
            </div>
            <div class="form-field">
              <label for="cnpj_cidade">CNPJ *</label>
              <input type="text" id="cnpj_cidade" name="cnpj_cidade" placeholder="00.000.000/0000-00">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="respondente_cidade">Nome do Respondente *</label>
              <input type="text" id="respondente_cidade" name="respondente_cidade">
            </div>
            <div class="form-field">
              <label for="cargo_cidade">Cargo do Respondente *</label>
              <input type="text" id="cargo_cidade" name="cargo_cidade" placeholder="Ex: Secretário de Turismo">
            </div>
          </div>
          <div class="form-row">
            <div class="form-field">
              <label for="email_cidade">E-mail *</label>
              <input type="email" id="email_cidade" name="email_cidade">
            </div>
            <div class="form-field">
              <label for="telefone_cidade">Telefone *</label>
              <input type="tel" id="telefone_cidade" name="telefone_cidade" placeholder="(00) 00000-0000">
            </div>
          </div>
        </div>

        <p class="erro-msg" id="erro-msg"></p>

        <button type="submit" class="btn btn-primary btn-block" id="btn-submit" style="margin-top:12px;">
          Continuar para o diagnóstico →
        </button>
      </form>
    </div>
  </div>
</section>

<footer class="site-footer">Diagnóstico ESG · Autoavaliação de Sustentabilidade para Empresas e Municípios</footer>

<script>
const UFS = ['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'];
['estado_empresa','estado_cidade'].forEach(id => {
  const sel = document.getElementById(id);
  sel.innerHTML = '<option value="">Selecione...</option>' + UFS.map(uf => `<option>${uf}</option>`).join('');
});

const params = new URLSearchParams(window.location.search);
const tipo = params.get('tipo') === 'cidade' ? 'cidade' : 'empresa';
sessionStorage.setItem('tipo', tipo);

if (tipo === 'cidade') {
  document.getElementById('titulo-form').textContent = 'Antes de começar, conte um pouco sobre o município';
  document.getElementById('subtitulo-form').textContent = 'Esses dados identificam o destino avaliado e servem para contato futuro. Leva menos de 1 minuto.';
  document.getElementById('campos-empresa').style.display = 'none';
  document.getElementById('campos-cidade').style.display = 'block';
}

document.querySelectorAll('.segmento-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    document.querySelectorAll('.segmento-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    opt.querySelector('input').checked = true;
  });
});

const form = document.getElementById('lead-form');
const erroMsg = document.getElementById('erro-msg');
const btn = document.getElementById('btn-submit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  erroMsg.style.display = 'none';

  let payload;
  let nomeParaSessao;

  if (tipo === 'cidade') {
    payload = {
      tipo: 'cidade',
      municipio: form.municipio.value.trim(),
      estado: form.estado_cidade.value,
      razao_social: form.razao_social_cidade.value.trim(),
      cnpj: form.cnpj_cidade.value.trim(),
      respondente: form.respondente_cidade.value.trim(),
      cargo: form.cargo_cidade.value.trim(),
      email: form.email_cidade.value.trim(),
      telefone: form.telefone_cidade.value.trim(),
    };
    nomeParaSessao = payload.municipio;
  } else {
    const segmentoEl = form.querySelector('input[name="segmento"]:checked');
    if (!segmentoEl) {
      erroMsg.textContent = 'Selecione o segmento da sua empresa.';
      erroMsg.style.display = 'block';
      return;
    }
    payload = {
      tipo: 'empresa',
      empresa: form.empresa.value.trim(),
      razao_social: form.razao_social_empresa.value.trim(),
      cnpj: form.cnpj_empresa.value.trim(),
      respondente: form.respondente_empresa.value.trim(),
      email: form.email_empresa.value.trim(),
      telefone: form.telefone_empresa.value.trim(),
      cidade: form.cidade_empresa.value.trim(),
      estado: form.estado_empresa.value,
      segmento: segmentoEl.value,
    };
    nomeParaSessao = payload.empresa;
  }

  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try {
    const resp = await fetch('/api/leads', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Erro ao enviar dados');

    sessionStorage.setItem('leadId', data.leadId);
    sessionStorage.setItem('leadNome', nomeParaSessao);
    window.location.href = `assessment.html?tipo=${tipo}`;
  } catch (err) {
    erroMsg.textContent = err.message;
    erroMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Continuar para o diagnóstico →';
  }
});
</script>

</body>
</html>
