<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Administrador — Diagnóstico ESG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<header class="topbar">
  <div class="container">
    <a href="../index.html" class="brand">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M12 2C7 6 4 10 4 14a8 8 0 0016 0c0-4-3-8-8-12z" fill="#66bb6a"/><path d="M12 22V10" stroke="#1b5e20" stroke-width="1.5"/></svg>
      Diagnóstico ESG
    </a>
    <nav><a href="#" id="btn-logout">Sair</a></nav>
  </div>
</header>

<section class="section" style="padding-top:36px;">
  <div class="container">
    <div class="topbar-admin">
      <h1 style="margin:0;">Painel do Administrador</h1>
      <button class="btn btn-primary" id="btn-csv">Exportar CSV</button>
    </div>

    <div class="admin-tabs">
      <button type="button" class="admin-tab active" data-tipo="empresa">Empresas</button>
      <button type="button" class="admin-tab" data-tipo="cidade">Cidades</button>
    </div>

    <div id="loading" class="spinner"></div>

    <div id="conteudo" style="display:none;">
      <div class="grid-3" style="margin-bottom:32px;">
        <div class="card stat-card">
          <div class="valor" id="total-respondentes">0</div>
          <div class="rotulo" id="rotulo-total">Empresas avaliadas</div>
        </div>
        <div class="card stat-card">
          <div class="valor" id="media-nota">0%</div>
          <div class="rotulo">Nota média geral</div>
        </div>
        <div class="card stat-card">
          <div class="valor" id="classificacao-top">-</div>
          <div class="rotulo">Classificação mais comum</div>
        </div>
      </div>

      <div class="grid-2" style="margin-bottom:32px;">
        <div class="card">
          <h3>Média por tema</h3>
          <canvas id="pilar-chart" height="220"></canvas>
        </div>
        <div class="card">
          <h3 id="titulo-grupo-chart">Empresas por segmento</h3>
          <canvas id="grupo-chart" height="220"></canvas>
        </div>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:12px;">
          <h3 style="margin:0;" id="titulo-tabela">Todas as respostas (leads)</h3>
          <input type="text" id="busca" placeholder="Buscar..." style="max-width:280px;">
        </div>
        <div class="table-wrap">
          <table>
            <thead id="tabela-head"></thead>
            <tbody id="tabela-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let STATS = null;
let tipoAtual = 'empresa';
let chartPilar = null;
let chartGrupo = null;

async function checkAuth() {
  const resp = await fetch('/api/admin/check');
  const data = await resp.json();
  if (!data.isAdmin) window.location.href = 'login.html';
}

const CORES_CLASSIFICACAO = {
  'Iniciante': '#c0392b', 'Emergente': '#d68910', 'Comprometida': '#d4ac0d',
  'Sustentável': '#2e7d32', 'Referência': '#00796b', 'Excelência ESG': '#1b5e20',
  'Inicial': '#c0392b', 'Básico': '#d68910', 'Em Desenvolvimento': '#d4ac0d',
  'Avançado': '#00796b', 'Destino de Excelência': '#1b5e20',
};

const COLUNAS = {
  empresa: [
    { titulo: 'Empresa', campo: r => r.lead.empresa },
    { titulo: 'CNPJ', campo: r => r.lead.cnpj },
    { titulo: 'Respondente', campo: r => r.lead.respondente },
    { titulo: 'E-mail', campo: r => r.lead.email },
    { titulo: 'Telefone', campo: r => r.lead.telefone },
    { titulo: 'Cidade/UF', campo: r => `${r.lead.cidade}/${r.lead.estado}` },
    { titulo: 'Segmento', campo: r => r.lead.segmento },
  ],
  cidade: [
    { titulo: 'Município', campo: r => r.lead.municipio },
    { titulo: 'Estado', campo: r => r.lead.estado },
    { titulo: 'Razão Social', campo: r => r.lead.razaoSocial },
    { titulo: 'CNPJ', campo: r => r.lead.cnpj },
    { titulo: 'Respondente', campo: r => r.lead.respondente },
    { titulo: 'Cargo', campo: r => r.lead.cargo },
    { titulo: 'E-mail', campo: r => r.lead.email },
    { titulo: 'Telefone', campo: r => r.lead.telefone },
  ],
};

async function loadStats(tipo) {
  tipoAtual = tipo;
  document.getElementById('loading').style.display = 'block';
  document.getElementById('conteudo').style.display = 'none';

  const resp = await fetch(`/api/admin/stats?tipo=${tipo}`);
  if (resp.status === 401) { window.location.href = 'login.html'; return; }
  STATS = await resp.json();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('conteudo').style.display = 'block';

  document.getElementById('rotulo-total').textContent = tipo === 'cidade' ? 'Municípios avaliados' : 'Empresas avaliadas';
  document.getElementById('titulo-grupo-chart').textContent = tipo === 'cidade' ? 'Municípios por estado' : 'Empresas por segmento';
  document.getElementById('titulo-tabela').textContent = tipo === 'cidade' ? 'Todas as respostas (municípios)' : 'Todas as respostas (empresas)';

  document.getElementById('total-respondentes').textContent = STATS.totalRespondentes;
  document.getElementById('media-nota').textContent = STATS.mediaNotaFinal + '%';

  const porClass = STATS.porClassificacao || {};
  const topClass = Object.entries(porClass).sort((a,b) => b[1]-a[1])[0];
  document.getElementById('classificacao-top').textContent = topClass ? topClass[0] : '-';

  if (chartPilar) chartPilar.destroy();
  chartPilar = new Chart(document.getElementById('pilar-chart'), {
    type: 'bar',
    data: {
      labels: STATS.mediaPorPilar.map(p => p.pilar),
      datasets: [{ label: 'Média (%)', data: STATS.mediaPorPilar.map(p => p.media), backgroundColor: '#2e7d32' }],
    },
    options: { indexAxis: 'y', scales: { x: { min: 0, max: 100 } }, plugins: { legend: { display: false } } },
  });

  if (chartGrupo) chartGrupo.destroy();
  chartGrupo = new Chart(document.getElementById('grupo-chart'), {
    type: 'doughnut',
    data: {
      labels: STATS.resumoGrupo.map(s => `${s.grupo} (${s.total})`),
      datasets: [{ data: STATS.resumoGrupo.map(s => s.total), backgroundColor: ['#2e7d32', '#00796b', '#c17a3f', '#66bb6a', '#d4ac0d', '#8e44ad'] }],
    },
  });

  const head = document.getElementById('tabela-head');
  const colunas = COLUNAS[tipo];
  head.innerHTML = `<tr>${colunas.map(c => `<th>${c.titulo}</th>`).join('')}<th>Nota</th><th>Classificação</th><th>Data</th></tr>`;

  renderTabela(STATS.submissions);
}

function renderTabela(submissions) {
  const body = document.getElementById('tabela-body');
  const colunas = COLUNAS[tipoAtual];
  const nColunas = colunas.length + 3;
  body.innerHTML = submissions.map(s => `
    <tr>
      ${colunas.map(c => `<td>${escapeHtml(c.campo(s) ?? '')}</td>`).join('')}
      <td><strong>${s.notaFinal}%</strong></td>
      <td><span class="tag" style="background:${(CORES_CLASSIFICACAO[s.classificacao]||'#2e7d32')}22; color:${CORES_CLASSIFICACAO[s.classificacao]||'#2e7d32'};">${escapeHtml(s.classificacao)}</span></td>
      <td>${new Date(s.submittedAt).toLocaleDateString('pt-BR')}</td>
    </tr>
  `).join('') || `<tr><td colspan="${nColunas}" style="text-align:center; color:var(--texto-suave);">Nenhuma resposta ainda.</td></tr>`;
}

document.getElementById('busca').addEventListener('input', (e) => {
  const termo = e.target.value.toLowerCase();
  if (!STATS) return;
  const colunas = COLUNAS[tipoAtual];
  const filtradas = STATS.submissions.filter(s =>
    colunas.some(c => String(c.campo(s) || '').toLowerCase().includes(termo))
  );
  renderTabela(filtradas);
});

document.querySelectorAll('.admin-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    loadStats(tab.dataset.tipo);
  });
});

document.getElementById('btn-csv').addEventListener('click', () => {
  window.location.href = `/api/admin/export.csv?tipo=${tipoAtual}`;
});

document.getElementById('btn-logout').addEventListener('click', async (e) => {
  e.preventDefault();
  await fetch('/api/admin/logout', { method: 'POST' });
  window.location.href = 'login.html';
});

checkAuth().then(() => loadStats('empresa'));
</script>

</body>
</html>
